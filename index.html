<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Reva! 🎉</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* TEMA: Soft Pink & Aesthetic */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: #333;
            overflow-x: hidden;
        }

        /* Teks Ulang Tahun - Ukuran fleksibel dengan clamp() */
        #birthdayMessage {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            color: #d81b60;
            margin: 10px 0 20px 0;
            text-align: center;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8);
            opacity: 0;
            transform: scale(0.8) translateY(30px);
            transition: all 1.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        #birthdayMessage.show {
            opacity: 1;
            transform: scale(1) translateY(0);
            animation: pulseText 2s infinite alternate;
        }

        @keyframes pulseText {
            0% { transform: scale(1); text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8); }
            100% { transform: scale(1.05); text-shadow: 2px 2px 20px rgba(216, 27, 96, 0.5); }
        }

        /* Panel Instruksi - Disesuaikan untuk HP */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 25px;
        }

        .glass-panel h2 { margin: 0 0 10px 0; color: #ad1457; font-weight: 600; font-size: 1.5rem; }
        .glass-panel p { margin: 0; font-size: 0.9rem; color: #444; line-height: 1.5; }

        /* Status Bar */
        #status {
            margin-top: 15px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background-color: rgba(255,255,255,0.8);
            color: #d81b60;
            display: inline-block;
        }

        /* WADAH UTAMA KAMERA & VIDEO */
        .main-container {
            display: flex;
            flex-direction: column; /* Default: Atas bawah untuk HP */
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 900px;
        }

        /* Wadah Khusus Kamera */
        .camera-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .camera-label {
            font-size: 0.75rem;
            color: #d81b60;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.5);
            padding: 4px 12px;
            border-radius: 12px;
        }

        .webcam-wrapper {
            position: relative;
            width: 220px; /* Lebih kecil agar tidak dominan */
            height: 165px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 3px solid white;
        }
        
        #webcam, #output_canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
        }

        #output_canvas { z-index: 2; pointer-events: none; }

        /* Wadah Khusus Video Kado */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 320px; /* Pas untuk format potret di HP */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.4);
            border: 5px solid white;
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .video-wrapper.show {
            display: block;
            opacity: 1;
            animation: floatVideo 4s ease-in-out infinite;
        }

        /* Animasi mengambang untuk video */
        @keyframes floatVideo {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        #targetVideo {
            width: 100%;
            display: block;
            background-color: #000;
            object-fit: cover;
        }

        /* MEDIA QUERY: Untuk layar laptop/tablet besar */
        @media (min-width: 768px) {
            .main-container {
                flex-direction: row; /* Berbaris menyamping di laptop */
                align-items: flex-start;
                justify-content: center;
                gap: 50px;
            }
            .webcam-wrapper {
                width: 260px;
                height: 195px;
            }
            .video-wrapper {
                max-width: 360px;
            }
        }
    </style>
</head>
<body>

    <h1 id="birthdayMessage">Selamat Ulang Tahun Reva! 🎉</h1>

    <div class="glass-panel">
        <h2>Hai Reva! ✨</h2>
        <p>Tunjukkan gestur ✌️ (Peace) ke arah kamera untuk membuka kado spesial dari aku. Tunjukkan ✊ (Mengepal) kalau mau mem-<i>pause</i> videonya.</p>
        <div id="status">⏳ Memuat keajaiban AI...</div>
    </div>

    <div class="main-container">
        
        <div class="camera-section">
            <div class="camera-label">Sensor Kamera</div>
            <div class="webcam-wrapper">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="output_canvas"></canvas>
            </div>
        </div>
        
        <div class="video-wrapper" id="videoWrapper">
            <video id="targetVideo" controls>
                <source src="vidio.mp4" type="video/mp4">
            </video>
        </div>

    </div>

    <script type="module">
        import { GestureRecognizer, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const webcam = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const targetVideo = document.getElementById('targetVideo');
        const videoWrapper = document.getElementById('videoWrapper');
        const statusText = document.getElementById('status');
        const birthdayMessage = document.getElementById('birthdayMessage');

        let gestureRecognizer;
        let runningMode = "VIDEO";
        let lastVideoTime = -1;
        let hasTriggeredBirthday = false; 

        function shootConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        async function initAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                        delegate: "GPU"
                    },
                    runningMode: runningMode
                });
                statusText.innerText = "✨ Kamera Siap! Coba tunjukkan jarimu.";
                startWebcam();
            } catch (error) {
                statusText.innerText = "❌ Gagal memuat AI.";
            }
        }

        async function startWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                webcam.srcObject = stream;
                webcam.addEventListener("loadeddata", predictWebcam);
            } catch (err) {
                statusText.innerText = "⚠️ Akses kamera ditolak.";
            }
        }

        async function predictWebcam() {
            if (!gestureRecognizer) return;

            let startTimeMs = performance.now();
            if (canvasElement.width !== webcam.videoWidth) {
                canvasElement.width = webcam.videoWidth;
                canvasElement.height = webcam.videoHeight;
            }

            if (webcam.currentTime !== lastVideoTime) {
                lastVideoTime = webcam.currentTime;
                const results = gestureRecognizer.recognizeForVideo(webcam, startTimeMs);

                canvasCtx.save();
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                if (results.landmarks && results.landmarks.length > 0) {
                    const drawingUtils = new DrawingUtils(canvasCtx);
                    for (const landmarks of results.landmarks) {
                        drawingUtils.drawConnectors(landmarks, GestureRecognizer.HAND_CONNECTIONS, { color: "#ffffff", lineWidth: 3 });
                        drawingUtils.drawLandmarks(landmarks, { color: "#ff80ab", lineWidth: 2, radius: 5 });
                    }
                }
                canvasCtx.restore();

                if (results.gestures.length > 0) {
                    const categoryName = results.gestures[0][0].categoryName;

                    if (categoryName === "Victory") {
                        statusText.innerText = "✌️ Video Diputar!";
                        if (!hasTriggeredBirthday) {
                            hasTriggeredBirthday = true;
                            birthdayMessage.classList.add('show');
                            videoWrapper.classList.add('show');
                            shootConfetti();
                        }
                        if (targetVideo.paused) targetVideo.play();
                        
                    } else if (categoryName === "Closed_Fist") {
                        statusText.innerText = "✊ Video di-pause.";
                        if (!targetVideo.paused) targetVideo.pause();
                    } else {
                        statusText.innerText = `Gestur: ${categoryName}`;
                    }
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        initAI();
    </script>
</body>
</html>
